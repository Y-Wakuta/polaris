# MySQL-specific overrides on top of polaris-runtime-defaults/application.properties.
# `db-kind` is fixed at Quarkus build time and must be set here, not at runtime.
quarkus.datasource.db-kind=mysql
polaris.persistence.relational.jdbc.database-type=mysql

# Distinguish this variant from the default runtime/server image (apache/polaris),
# so both variants can coexist when built locally.
quarkus.container-image.name=polaris-mysql

# Integration tests use testcontainers directly; dev services are not needed.
quarkus.datasource.devservices.enabled=false
quarkus.devservices.enabled=false
